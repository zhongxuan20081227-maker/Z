<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>AI 英文自主學習系統</title>
    <style>
        :root {
            --dark-blue: #2c3e50;
            --light-blue: #34495e;
            --accent: #a29bfe;
            --danger: #e74c3c;
            --success: #2ecc71;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f4f7f6; }

        /* 左側側邊欄 */
        #sidebar {
            width: 280px; background: var(--dark-blue); color: white;
            display: flex; flex-direction: column; padding: 20px; transition: 0.3s;
        }

        .menu-header { font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #3e5871; padding-bottom: 10px; }
        
        .course-list { flex-grow: 1; overflow-y: auto; }
        .course-item { 
            background: var(--light-blue); padding: 12px; margin-bottom: 10px; 
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .course-item:hover { background: #455a64; }
        .del-btn { background: none; border: none; color: #bdc3c7; cursor: pointer; font-size: 16px; }
        .del-btn:hover { color: var(--danger); }

        .wrong-section { border-top: 2px solid #3e5871; padding-top: 15px; margin-top: 10px; }
        #btn-wrong-pool { 
            width: 100%; padding: 12px; background: #e67e22; color: white; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        /* 右側主區域 */
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        
        .nav-tabs { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab { padding: 12px 25px; background: white; border-radius: 30px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab.active { background: var(--accent); color: white; font-weight: bold; }

        .quiz-container {
            background: white; width: 100%; max-width: 800px; padding: 50px;
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center;
        }

        .cn-hint { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 10px; }
        .sentence-display { font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 1px; }
        .word-hint { color: var(--accent); font-weight: bold; font-size: 1.1rem; }

        .input-box {
            width: 80%; padding: 15px; font-size: 1.4rem; border: 2px solid #ddd;
            border-radius: 10px; margin-bottom: 20px; text-align: center; outline: none;
        }
        .input-box:focus { border-color: var(--accent); }

        .action-btns { display: flex; gap: 15px; width: 80%; }
        .btn { padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-size: 1rem; flex: 1; transition: 0.2s; }
        .btn-speak { background: #9b59b6; color: white; flex: 0.3; }
        .btn-submit { background: var(--dark-blue); color: white; }
        .btn-submit:hover { opacity: 0.9; }

        #feedback { margin-top: 20px; font-size: 1.1rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="menu-header">學習菜單</div>
    <div class="course-list" id="courseList">
        </div>
    
    <div class="wrong-section">
        <input type="file" id="fileInput" accept=".txt" style="display:none">
        <button class="btn btn-submit" style="width:100%; margin-bottom:10px;" onclick="document.getElementById('fileInput').click()">匯入 TXT 檔案</button>
        <button id="btn-wrong-pool" onclick="loadWrongPool()">❌ 錯題整理紀錄</button>
    </div>
</div>

<div id="main">
    <div class="nav-tabs">
        <div class="tab active">句子填空</div>
        <div class="tab">聽力練習</div>
        <div class="tab">口說測驗</div>
    </div>

    <div class="quiz-container">
        <div id="quiz-box">
            <p class="cn-hint" id="cnHint">請點選左側課程或匯入檔案</p>
            <p class="word-hint" id="wordHint"></p>
            <div class="sentence-display" id="sentenceDisplay">等待開始...</div>
            
            <input type="text" class="input-box" id="userInput" placeholder="在此輸入答案..." autocomplete="off">
            
            <div class="action-btns">
                <button class="btn btn-speak" onclick="playAudio()">🔊</button>
                <button class="btn btn-speak" onclick="startSpeech()">🎤</button>
                <button class="btn btn-submit" onclick="checkAnswer()">送出答案 (Enter)</button>
            </div>
            <p id="feedback"></p>
        </div>
    </div>
</div>

<script>
    let lessons = [];
    let currentQuiz = [];
    let currentIndex = 0;
    let wrongPool = [];

    // 1. 檔案匯入處理
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split('\n').filter(line => line.trim() !== "");
            
            // 解析格式: 中文|句子|正確答案|原形單字
            const quizData = lines.map(line => {
                const [cn, sen, ans, base] = line.split('|');
                return { cn, sen, ans: ans.trim(), base: base.trim() };
            });

            lessons.push({ name: file.name, data: quizData });
            renderSidebar();
        };
        reader.readAsText(file);
    });

    function renderSidebar() {
        const container = document.getElementById('courseList');
        container.innerHTML = "";
        lessons.forEach((lesson, index) => {
            const item = document.createElement('div');
            item.className = 'course-item';
            item.innerHTML = `
                <span onclick="startLesson(${index})">${lesson.name}</span>
                <button class="del-btn" onclick="deleteLesson(${index}, event)">✕</button>
            `;
            container.appendChild(item);
        });
    }

    function deleteLesson(index, e) {
        e.stopPropagation();
        lessons.splice(index, 1);
        renderSidebar();
    }

    // 2. 測驗邏輯
    function startLesson(index) {
        currentQuiz = lessons[index].data;
        currentIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentQuiz.length) {
            document.getElementById('sentenceDisplay').innerText = "本課練習結束！";
            return;
        }

        const q = currentQuiz[currentIndex];
        const firstChar = q.ans[0];
        const lastCharOfBase = q.base[q.base.length - 1];

        document.getElementById('cnHint').innerText = q.cn;
        document.getElementById('wordHint').innerText = `提示：${firstChar} ... ${lastCharOfBase}`;
        document.getElementById('sentenceDisplay').innerText = q.sen.replace(q.ans, "_______");
        document.getElementById('userInput').value = "";
        document.getElementById('feedback').innerText = "";
    }

    function checkAnswer() {
        const userAns = document.getElementById('userInput').value.trim().toLowerCase();
        const correctAns = currentQuiz[currentIndex].ans.toLowerCase();
        const feedback = document.getElementById('feedback');

        if (userAns === correctAns) {
            feedback.innerText = "Excellent! 正確！";
            feedback.style.color = "var(--success)";
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 1000);
        } else {
            feedback.innerText = `再試一次！(正確答案: ${currentQuiz[currentIndex].ans})`;
            feedback.style.color = "var(--danger)";
            // 加入錯題集
            if (!wrongPool.some(item => item.ans === currentQuiz[currentIndex].ans)) {
                wrongPool.push(currentQuiz[currentIndex]);
            }
        }
    }

    // 3. 語音功能
    function playAudio() {
        const q = currentQuiz[currentIndex];
        const msg = new SpeechSynthesisUtterance(q.sen);
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function startSpeech() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById('userInput').value = event.results[0][0].transcript;
        };
    }

    // 4. 錯題整理
    function loadWrongPool() {
        if (wrongPool.length === 0) {
            alert("目前沒有錯題紀錄喔！太棒了！");
            return;
        }
        currentQuiz = [...wrongPool];
        currentIndex = 0;
        showQuestion();
        alert("已載入錯題複習模式");
    }

    // Enter 鍵監聽
    document.getElementById('userInput').addEventListener('keyup', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>

</body>
</html>
