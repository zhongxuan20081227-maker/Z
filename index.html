<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>我的英文學習 App</title>
    <style>
        :root { --side: #2c3e50; --bg: #f5f6fa; --primary: #6c5ce7; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: var(--bg); }
        
        /* 側邊欄固定按鈕 */
        #sidebar { width: 300px; background: var(--side); color: white; display: flex; flex-direction: column; padding: 15px; }
        .list-area { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .course-btn { 
            background: #34495e; padding: 12px; margin-bottom: 8px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .del-x { background: #ff7675; border: none; color: white; border-radius: 4px; padding: 2px 8px; cursor: pointer; }
        
        .bottom-controls { border-top: 1px solid #444; padding-top: 15px; }
        .big-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 10px; font-size: 16px; }
        .btn-import { background: var(--primary); color: white; }
        .btn-wrong { background: #e67e22; color: white; }

        /* 主畫面 */
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .card { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        
        .input-style { width: 90%; padding: 15px; font-size: 20px; border: 2px solid #ddd; border-radius: 10px; margin: 20px 0; text-align: center; }
        .control-row { display: flex; gap: 10px; justify-content: center; }
        .action-btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-check { background: #2d3436; color: white; flex-grow: 1; }
        .btn-tool { background: #eee; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="font-size: 20px; font-weight: bold; margin-bottom: 10px;">學習菜單</div>
    <div class="list-area" id="courseList"></div>
    
    <div class="bottom-controls">
        <input type="file" id="fileIn" style="display:none" accept=".txt">
        <button class="big-btn btn-import" onclick="document.getElementById('fileIn').click()">匯入 TXT 檔案</button>
        <button class="big-btn btn-wrong" onclick="startWrongMode()">❌ 錯題整理按鈕</button>
    </div>
</div>

<div id="main">
    <div class="card" id="quizCard" style="display:none">
        <div id="cnHint" style="color: #666; font-size: 18px;"></div>
        <div id="letterHint" style="color: var(--primary); font-weight: bold; font-size: 24px; margin: 10px 0;"></div>
        <div id="senDisplay" style="font-size: 22px; margin-bottom: 20px;"></div>
        
        <input type="text" id="userInput" class="input-style" placeholder="輸入英文...">
        
        <div class="control-row">
            <button class="action-btn btn-tool" onclick="speak()">🔊 聽力</button>
            <button class="action-btn btn-tool" onclick="listen()">🎤 口說</button>
            <button class="action-btn btn-check" onclick="check()">對答案 (Enter)</button>
        </div>
        <div id="msg" style="margin-top: 15px; font-weight: bold;"></div>
    </div>
    <div id="empty" style="margin-top: 100px; color: #999;">目前沒有課程，請先匯入檔案。</div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('my_eng_db')) || [];
    let wrongs = JSON.parse(localStorage.getItem('my_wrong_db')) || [];
    let activeList = [];
    let idx = 0;

    renderList();

    // 強大的讀取邏輯：不限格式，只要有字就抓
    document.getElementById('fileIn').onchange = function(e) {
        let file = e.target.files[0];
        if(!file) return;
        let reader = new FileReader();
        reader.onload = function(re) {
            let lines = re.target.result.split('\n').filter(l => l.trim() !== "");
            let quiz = lines.map(l => {
                let p = l.split(/[|,-]/); // 支援 | 或 , 或 - 分隔
                return {
                    cn: p[0] || "未提供中文",
                    sen: p[1] || `How to spell "${p[2] || p[0]}"?`, // 若沒給句子自動生成
                    ans: (p[2] || p[0]).trim(),
                    base: (p[3] || p[2] || p[0]).trim()
                };
            });
            db.push({ name: file.name, data: quiz });
            save();
            renderList();
        };
        reader.readAsText(file);
    };

    function renderList() {
        let h = "";
        db.forEach((c, i) => {
            h += `<div class="course-btn"><span onclick="load(${i})">${c.name}</span>
                  <button class="del-x" onclick="del(${i})">刪除</button></div>`;
        });
        document.getElementById('courseList').innerHTML = h;
    }

    function save() {
        localStorage.setItem('my_eng_db', JSON.stringify(db));
        localStorage.setItem('my_wrong_db', JSON.stringify(wrongs));
    }

    function del(i) {
        db.splice(i, 1);
        save();
        renderList();
    }

    function load(i) {
        activeList = db[i].data;
        idx = 0;
        document.getElementById('empty').style.display = 'none';
        document.getElementById('quizCard').style.display = 'block';
        show();
    }

    function show() {
        if(idx >= activeList.length) {
            document.getElementById('senDisplay').innerText = "練習結束！";
            return;
        }
        let q = activeList[idx];
        document.getElementById('cnHint').innerText = q.cn;
        // 字首 + 原形字尾邏輯
        let hint = q.ans[0] + "..." + q.base.slice(-1);
        document.getElementById('letterHint').innerText = "提示：" + hint;
        document.getElementById('senDisplay').innerText = q.sen.includes("___") ? q.sen : q.sen + " (" + q.ans + ")";
        document.getElementById('userInput').value = "";
        document.getElementById('msg').innerText = "";
    }

    function check() {
        let ua = document.getElementById('userInput').value.trim().toLowerCase();
        let ca = activeList[idx].ans.toLowerCase();
        if(ua === ca) {
            document.getElementById('msg').innerText = "✅ 正確！";
            document.getElementById('msg').style.color = "green";
            setTimeout(() => { idx++; show(); }, 800);
        } else {
            document.getElementById('msg').innerText = "❌ 錯了，答案是: " + activeList[idx].ans;
            document.getElementById('msg').style.color = "red";
            if(!wrongs.some(w => w.ans === activeList[idx].ans)) {
                wrongs.push(activeList[idx]);
                save();
            }
        }
    }

    function startWrongMode() {
        if(wrongs.length === 0) return alert("沒有錯題紀錄");
        activeList = wrongs;
        idx = 0;
        document.getElementById('empty').style.display = 'none';
        document.getElementById('quizCard').style.display = 'block';
        show();
    }

    function speak() {
        let q = activeList[idx];
        let s = new SpeechSynthesisUtterance(q.sen.replace("___", q.ans));
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
    }

    function listen() {
        let r = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        r.lang = 'en-US';
        r.onresult = e => document.getElementById('userInput').value = e.results[0][0].transcript;
        r.start();
    }

    document.getElementById('userInput').onkeypress = e => { if(e.key === 'Enter') check(); };
</script>
</body>
</html>
