<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英文學習系統 - 客製化版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        :root {
            --sidebar-color: #2c3e50;
            --active-color: #34495e;
            --accent: #6c5ce7;
            --danger: #e74c3c;
            --wrong-bg: #e67e22;
        }

        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f5; }

        /* 左側側邊欄 */
        #sidebar {
            width: 300px; background: var(--sidebar-color); color: white;
            display: flex; flex-direction: column; padding: 20px;
        }

        .menu-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid #455a64; padding-bottom: 10px; }
        
        .course-list { flex-grow: 1; overflow-y: auto; }
        .course-item { 
            background: var(--active-color); padding: 12px; margin-bottom: 10px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .course-item:hover { background: #4b6584; }
        .del-btn { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; }

        .sidebar-footer { border-top: 1px solid #455a64; padding-top: 20px; }
        .btn-wrong { background: var(--wrong-bg); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .file-label { background: var(--accent); color: white; display: block; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; }

        /* 右側主區域 */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; padding: 40px; position: relative; }
        
        .quiz-card { 
            background: white; width: 100%; max-width: 750px; padding: 40px; 
            border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }

        .mode-switch { margin-bottom: 20px; display: flex; gap: 10px; }
        .mode-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; background: white; }
        .mode-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .cn-text { font-size: 1.1rem; color: #666; margin-bottom: 5px; }
        .hint-text { color: var(--accent); font-weight: bold; margin-bottom: 15px; font-size: 1.2rem; }
        .sentence { font-size: 1.8rem; margin: 20px 0; min-height: 60px; }
        
        .answer-input { 
            width: 80%; padding: 15px; font-size: 1.4rem; border: 2px solid #ddd; 
            border-radius: 12px; text-align: center; margin-bottom: 20px; outline: none;
        }
        .answer-input:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn-ui { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-submit { background: var(--sidebar-color); color: white; flex-grow: 1; }
        .btn-tool { background: #e0e0e0; color: #333; }

        #feedback { margin-top: 20px; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="menu-title">學習選單</div>
    <div class="course-list" id="courseList"></div>
    
    <div class="sidebar-footer">
        <label class="file-label">➕ 匯入 TXT / PDF
            <input type="file" id="fileInput" accept=".txt,.pdf" style="display:none">
        </label>
        <button class="btn-wrong" onclick="loadWrongQuestions()">❌ 查看錯題整理</button>
    </div>
</div>

<div id="main-content">
    <div class="mode-switch">
        <div class="mode-btn active" id="mode-en-cn">中翻英</div>
        <div class="mode-btn" id="mode-cn-en">英翻中</div>
    </div>

    <div class="quiz-card" id="quizContainer" style="display:none">
        <div class="cn-text" id="displayHint1">翻譯提示</div>
        <div class="hint-text" id="displayLetterHint">s...died</div>
        <div class="sentence" id="displaySentence">句子載入中...</div>
        
        <input type="text" class="answer-input" id="userInput" placeholder="輸入正確單字" autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-ui btn-tool" onclick="playVoice()">🔊 聽力</button>
            <button class="btn-ui btn-tool" onclick="startMic()">🎤 口說</button>
            <button class="btn-ui btn-submit" onclick="handleCheck()">送出答案 (Enter)</button>
        </div>
        <div id="feedback"></div>
    </div>
    <div id="empty-state" style="margin-top:100px; color:#999;">請從左側匯入或選擇課程</div>
</div>

<script>
    // 資料儲存變數
    let courses = JSON.parse(localStorage.getItem('edu_courses')) || [];
    let wrongBank = JSON.parse(localStorage.getItem('edu_wrong')) || [];
    let currentQuiz = [];
    let currentIndex = 0;

    // 初始化介面
    renderSidebar();

    // 1. 檔案匯入處理
    document.getElementById('fileInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        let content = "";
        if (file.type === "application/pdf") {
            content = await readPdf(file);
        } else {
            content = await file.text();
        }
        
        parseContent(file.name, content);
    });

    async function readPdf(file) {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            text += textContent.items.map(s => s.str).join(' ') + "\n";
        }
        return text;
    }

    function parseContent(filename, text) {
        const lines = text.split('\n').filter(l => l.includes('|'));
        const quizData = lines.map(line => {
            const [cn, sen, ans, base] = line.split('|').map(s => s.trim());
            return { cn, sen, ans, base };
        });

        if (quizData.length > 0) {
            courses.push({ id: Date.now(), name: filename, data: quizData });
            saveToStorage();
            renderSidebar();
        } else {
            alert("格式錯誤！請確認檔案內容包含 | 分隔符號");
        }
    }

    // 2. 顯示邏輯
    function renderSidebar() {
        const list = document.getElementById('courseList');
        list.innerHTML = "";
        courses.forEach((c, idx) => {
            const div = document.createElement('div');
            div.className = 'course-item';
            div.innerHTML = `
                <span onclick="startLesson(${idx})">${c.name}</span>
                <button class="del-btn" onclick="deleteCourse(${idx})">刪除</button>
            `;
            list.appendChild(div);
        });
    }

    function startLesson(idx) {
        currentQuiz = courses[idx].data;
        currentIndex = 0;
        initUI();
    }

    function initUI() {
        document.getElementById('empty-state').style.display = "none";
        document.getElementById('quizContainer').style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentQuiz.length) {
            document.getElementById('displaySentence').innerText = "課程結束！恭喜完成！";
            return;
        }
        const q = currentQuiz[currentIndex];
        
        // 核心提示邏輯：字首 + 原形尾端的變化部分
        // 範例: ans=studied, base=study -> s...died
        const firstLetter = q.ans.charAt(0);
        
        // 找出原形最後一個字母在答案單字中的位置，截取後段
        const baseTail = q.base.slice(-1); 
        const tailIndex = q.ans.lastIndexOf(baseTail);
        const tailHint = (tailIndex !== -1 && tailIndex < q.ans.length - 1) 
                         ? q.ans.slice(tailIndex + 1) 
                         : q.ans.slice(-1);
        
        document.getElementById('displayHint1').innerText = q.cn;
        document.getElementById('displayLetterHint').innerText = `${firstLetter}...${tailHint}`;
        document.getElementById('displaySentence').innerText = q.sen.replace(q.ans, "_______");
        document.getElementById('userInput').value = "";
        document.getElementById('feedback').innerText = "";
    }

    // 3. 測驗操作
    function handleCheck() {
        const userVal = document.getElementById('userInput').value.trim().toLowerCase();
        const correctVal = currentQuiz[currentIndex].ans.toLowerCase();
        const feedback = document.getElementById('feedback');

        if (userVal === correctVal) {
            feedback.innerText = "答對了！✨";
            feedback.style.color = "#2ecc71";
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 1000);
        } else {
            feedback.innerText = `錯誤！正確答案是: ${currentQuiz[currentIndex].ans}`;
            feedback.style.color = "#e74c3c";
            
            // 加入錯題集 (避免重複)
            if (!wrongBank.some(w => w.ans === currentQuiz[currentIndex].ans)) {
                wrongBank.push(currentQuiz[currentIndex]);
                saveToStorage();
            }
        }
    }

    function loadWrongQuestions() {
        if (wrongBank.length === 0) return alert("目前沒有錯題紀錄！");
        currentQuiz = [...wrongBank];
        currentIndex = 0;
        initUI();
        alert("已載入錯題複習模式");
    }

    // 4. 語音工具
    function playVoice() {
        const q = currentQuiz[currentIndex];
        const msg = new SpeechSynthesisUtterance(q.sen.replace("_______", q.ans));
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function startMic() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.onresult = (event) => {
            document.getElementById('userInput').value = event.results[0][0].transcript;
        };
        recognition.start();
    }

    // 5. 系統工具
    function deleteCourse(idx) {
        courses.splice(idx, 1);
        saveToStorage();
        renderSidebar();
    }

    function saveToStorage() {
        localStorage.setItem('edu_courses', JSON.stringify(courses));
        localStorage.setItem('edu_wrong', JSON.stringify(wrongBank));
    }

    // Enter 鍵送出
    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleCheck();
    });
</script>

</body>
</html>
