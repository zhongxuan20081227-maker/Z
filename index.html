<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 英文學習系統 - 強化版</title>
    <style>
        :root {
            --sidebar-bg: #2c3e50;
            --main-bg: #f8f9fa;
            --accent: #6c5ce7;
            --wrong: #e67e22;
            --danger: #ff7675;
        }

        body { font-family: 'PingFang TC', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--main-bg); overflow: hidden; }

        /* 左側側邊欄 */
        #sidebar {
            width: 280px; background: var(--sidebar-bg); color: white;
            display: flex; flex-direction: column; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.2);
        }

        .sidebar-header { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #455a64; }
        
        #course-list { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .course-item { 
            background: #34495e; padding: 12px; margin-bottom: 8px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .course-item:hover { background: #4b6584; }
        .course-item span { flex-grow: 1; }
        .btn-del { background: var(--danger); color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 0.8rem; }

        .sidebar-footer { border-top: 1px solid #455a64; padding-top: 15px; }
        .btn-import { background: var(--accent); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-wrong { background: var(--wrong); color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 右側主區域 */
        #main { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        .quiz-card { 
            background: white; width: 90%; max-width: 800px; padding: 40px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center;
        }

        .sentence { font-size: 1.8rem; margin: 20px 0; color: #2d3436; font-weight: 500; }
        .cn-hint { font-size: 1.1rem; color: #636e72; margin-bottom: 10px; }
        .letter-hint { color: var(--accent); font-weight: bold; font-size: 1.2rem; }

        .input-box {
            width: 80%; padding: 15px; font-size: 1.4rem; border: 2px solid #dfe6e9; 
            border-radius: 12px; text-align: center; outline: none; margin-bottom: 20px;
        }
        .input-box:focus { border-color: var(--accent); }

        .btn-group { display: flex; gap: 15px; justify-content: center; width: 80%; }
        .btn-action { padding: 12px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; flex: 1; }
        .btn-voice { background: #a29bfe; color: white; }
        .btn-submit { background: var(--sidebar-bg); color: white; }

        #result { margin-top: 20px; font-weight: bold; font-size: 1.2rem; min-height: 1.5em; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">學習菜單</div>
    <div id="course-list">
        </div>
    
    <div class="sidebar-footer">
        <input type="file" id="fileInput" accept=".txt" style="display:none">
        <button class="btn-import" onclick="document.getElementById('fileInput').click()">匯入檔案 (.txt)</button>
        <button class="btn-wrong" onclick="loadWrongBank()">❌ 錯題整理紀錄</button>
    </div>
</div>

<div id="main">
    <div class="quiz-card" id="quiz-ui" style="display:none">
        <div class="cn-hint" id="cn-text">中文翻譯</div>
        <div class="letter-hint" id="hint-text">提示：s...y</div>
        <div class="sentence" id="en-sentence">He _______ hard yesterday.</div>
        
        <input type="text" class="input-box" id="user-input" placeholder="在此輸入答案..." autocomplete="off">
        
        <div class="btn-group">
            <button class="btn-action btn-voice" onclick="playVoice()">🔊 聽力 / 🎤 口說</button>
            <button class="btn-action btn-submit" onclick="checkAnswer()">對答案 (Enter)</button>
        </div>
        <div id="result"></div>
    </div>
    <div id="welcome-msg" style="margin-top: 100px; color: #b2bec3; text-align: center;">
        <h2>歡迎使用</h2>
        <p>請先從左側點擊「匯入檔案」，選取你的 TXT 內容。</p>
    </div>
</div>

<script>
    // 資料結構：lessons = [{ name: '第一課', data: [...] }]
    let lessons = JSON.parse(localStorage.getItem('eng_lessons')) || [];
    let wrongBank = JSON.parse(localStorage.getItem('eng_wrong')) || [];
    let currentQuizData = [];
    let currentIndex = 0;

    // 初始化側邊欄
    refreshSidebar();

    // 1. 檔案讀取功能
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            const lines = content.split('\n').filter(l => l.trim().includes('|'));
            
            const quizData = lines.map(line => {
                const parts = line.split('|').map(s => s.trim());
                return { cn: parts[0], sen: parts[1], ans: parts[2], base: parts[3] };
            });

            if (quizData.length > 0) {
                lessons.push({ id: Date.now(), name: file.name.replace('.txt', ''), data: quizData });
                saveData();
                refreshSidebar();
                alert('匯入成功！課程已保存在左側。');
            } else {
                alert('格式不正確！請確保內容為：中文|句子|正確單字|原形單字');
            }
        };
        reader.readAsText(file);
    });

    // 2. 側邊欄與存檔功能
    function refreshSidebar() {
        const list = document.getElementById('course-list');
        list.innerHTML = "";
        lessons.forEach((course, index) => {
            const div = document.createElement('div');
            div.className = 'course-item';
            div.innerHTML = `
                <span onclick="startLesson(${index})">${course.name}</span>
                <button class="btn-del" onclick="deleteLesson(${index}, event)">刪除</button>
            `;
            list.appendChild(div);
        });
    }

    function deleteLesson(index, event) {
        event.stopPropagation(); // 防止觸發課程點擊
        if (confirm('確定要刪除這一課嗎？')) {
            lessons.splice(index, 1);
            saveData();
            refreshSidebar();
            location.reload(); // 重新整理清空當前畫面
        }
    }

    function saveData() {
        localStorage.setItem('eng_lessons', JSON.stringify(lessons));
        localStorage.setItem('eng_wrong', JSON.stringify(wrongBank));
    }

    // 3. 測驗邏輯
    function startLesson(index) {
        currentQuizData = lessons[index].data;
        initQuiz();
    }

    function initQuiz() {
        currentIndex = 0;
        document.getElementById('welcome-msg').style.display = "none";
        document.getElementById('quiz-ui').style.display = "block";
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= currentQuizData.length) {
            document.getElementById('en-sentence').innerText = "本課練習完畢！";
            return;
        }
        const q = currentQuizData[currentIndex];
        
        // 字首 + 原形字尾邏輯
        const firstChar = q.ans.charAt(0);
        const lastCharBase = q.base.charAt(q.base.length - 1);
        
        document.getElementById('cn-text').innerText = q.cn;
        document.getElementById('hint-text').innerText = `提示：${firstChar}...${lastCharBase}`;
        document.getElementById('en-sentence').innerText = q.sen.replace(q.ans, "_______");
        document.getElementById('user-input').value = "";
        document.getElementById('result').innerText = "";
    }

    function checkAnswer() {
        const userAns = document.getElementById('user-input').value.trim().toLowerCase();
        const correctAns = currentQuizData[currentIndex].ans.toLowerCase();
        const feedback = document.getElementById('result');

        if (userAns === correctAns) {
            feedback.innerHTML = "<span style='color:#27ae60'>答對了！✨</span>";
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 1000);
        } else {
            feedback.innerHTML = `<span style='color:#e74c3c'>錯誤！答案是: ${currentQuizData[currentIndex].ans}</span>`;
            
            // 加入錯題集 (檢查重複)
            const exists = wrongBank.some(w => w.ans === currentQuizData[currentIndex].ans);
            if (!exists) {
                wrongBank.push(currentQuizData[currentIndex]);
                saveData();
            }
        }
    }

    // 4. 錯題集功能
    function loadWrongBank() {
        if (wrongBank.length === 0) {
            alert('目前沒有錯題紀錄喔！');
            return;
        }
        currentQuizData = wrongBank;
        initQuiz();
        alert('已載入「錯題整理」模式');
    }

    // 5. 語音工具
    function playVoice() {
        const q = currentQuizData[currentIndex];
        const msg = new SpeechSynthesisUtterance(q.sen.replace("_______", q.ans));
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);

        // 同時啟動辨識 (口說)
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'en-US';
        recognition.onresult = (event) => {
            document.getElementById('user-input').value = event.results[0][0].transcript;
        };
        recognition.start();
    }

    // 監聽 Enter 鍵
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });
</script>

</body>
</html>
